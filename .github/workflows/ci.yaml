name: CI - Pull Request Checks

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

env:
  KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
  KOSLI_ORG: ${{ vars.KOSLI_ORG }}

permissions:
  contents: read

jobs:
  # Quality checks on PR branch
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          check-latest: true
          go-version-file: '.go-version'

      - name: Verify Go version
        run: go version

      - name: Check code formatting
        run: |
          make fmt
          if [ -n "$(git status --porcelain)" ]; then
            echo "Code is not formatted. Run 'make fmt' locally."
            git diff
            exit 1
          fi

      - name: Check documentation is up-to-date
        run: |
          go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.24.0
          make docs
          if [ -n "$(git status --porcelain)" ]; then
            echo "Documentation is out of date. Run 'make docs' locally."
            git diff
            exit 1
          fi

      - name: Run go vet
        run: make vet

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests with coverage
        run: make test

      - name: Run acceptance tests
        run: make testacc

  # Build verification (but don't attest to Kosli)
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          check-latest: true
          go-version-file: '.go-version'

      - name: Build provider
        run: make build

      - name: Upload provider binary for validation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-provider-kosli
          path: terraform-provider-kosli
          retention-days: 1

  # Validate examples
  validate-examples:
    name: Validate ${{ matrix.example }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    strategy:
      fail-fast: false
      matrix:
        example:
          - examples/resources/kosli_action
          - examples/resources/kosli_custom_attestation_type
          - examples/resources/kosli_environment
          - examples/resources/kosli_flow
          - examples/resources/kosli_logical_environment
          - examples/resources/kosli_policy
          - examples/resources/kosli_policy_attachment
          - examples/resources/kosli_service_account
          - examples/resources/kosli_service_account_api_key
          - examples/data-sources/kosli_action
          - examples/data-sources/kosli_custom_attestation_type
          - examples/data-sources/kosli_environment
          - examples/data-sources/kosli_flow
          - examples/data-sources/kosli_logical_environment
          - examples/data-sources/kosli_policy
          - examples/data-sources/kosli_service_account

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          check-latest: true
          go-version-file: '.go-version'

      - name: Download provider binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: terraform-provider-kosli

      - name: Make binary executable
        run: chmod +x terraform-provider-kosli

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "~1.10.0"
          terraform_wrapper: false

      - name: Install provider
        run: make install

      - name: Configure Terraform dev override
        run: |
          OS_ARCH="$(go env GOOS)_$(go env GOARCH)"
          INSTALL_DIR="$HOME/.terraform.d/plugins/registry.terraform.io/kosli-dev/kosli/dev/$OS_ARCH"

          cat > "$HOME/.terraformrc" <<EOF
          provider_installation {
            dev_overrides {
              "registry.terraform.io/kosli-dev/kosli" = "$INSTALL_DIR"
            }
            direct {}
          }
          EOF

      - name: Validate example
        run: |
          echo "Validating ${{ matrix.example }}..."
          cd "${{ matrix.example }}"
          terraform init -backend=false
          terraform validate
          echo "✓ ${{ matrix.example }} validated successfully"
