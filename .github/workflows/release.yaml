name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pull-requests: write
  id-token: write  # required for the Anthropic OIDC/WIF token exchange

jobs:
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - uses: kosli-dev/reusable-actions/slack-release-notify@f739efd12323329b5656fbbda9d843a836ace5ff # main
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel-id: ${{ vars.SLACK_CHANNEL_ID }}
          stage: start

  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          check-latest: true
          go-version-file: '.go-version'

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2' # current latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

      - name: Prepare changelog inputs
        run: |
          mkdir -p /tmp/changelog-inputs
          VERSION="${GITHUB_REF_NAME}"
          echo "Generating for: ${VERSION}"
          DATE=$(date +%Y-%m-%d)

          PREV=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${VERSION}$" \
            | head -n 1)
          PREV="${PREV:-$(git rev-list --max-parents=0 HEAD)}"

          git log "${PREV}..${VERSION}" --no-merges --pretty=format:"%s|%b" > /tmp/changelog-inputs/commits.txt
          tail -n 100 CHANGELOG.md 2>/dev/null > /tmp/changelog-inputs/existing.txt || : > /tmp/changelog-inputs/existing.txt
          cp .github/changelog-skill.md /tmp/changelog-inputs/skill.md
          printf 'VERSION=%s\nDATE=%s\n' "$VERSION" "$DATE" > /tmp/changelog-inputs/meta.txt

      - name: Generate changelog entry
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        with:
          anthropic_federation_rule_id: ${{ vars.ANTHROPIC_FEDERATION_RULE_ID }}
          anthropic_organization_id: ${{ vars.ANTHROPIC_ORGANIZATION_ID }}
          anthropic_service_account_id: ${{ vars.ANTHROPIC_SERVICE_ACCOUNT_ID }}
          prompt: |
            You are generating one new entry for this project's CHANGELOG.md.

            Treat the contents of /tmp/changelog-inputs/skill.md as your governing
            instructions for style, structure, and tone — follow them strictly.

            Inputs (read these from disk):
            - /tmp/changelog-inputs/existing.txt — tail of the current CHANGELOG.md
            - /tmp/changelog-inputs/commits.txt — new commits since the previous tag (format: "subject|body" per line)
            - /tmp/changelog-inputs/meta.txt — defines VERSION and DATE for the new entry

            Generate the changelog section for VERSION released on DATE.
            Output ONLY the new changelog entry — no preamble, no commentary, no questions.
            Assume this is always the latest entry.

            Write the result to /tmp/entry.md and do not modify any other files.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Read,Write"

      - name: Insert changelog entry
        run: |
          if [ ! -s /tmp/entry.md ]; then
            echo "ERROR: changelog entry was not generated" >&2
            exit 1
          fi
          ENTRY=$(cat /tmp/entry.md)
          HEADER_LINE=$(grep -n '^# ' CHANGELOG.md 2>/dev/null | head -1 | cut -d: -f1)
          if [ -n "$HEADER_LINE" ]; then
            head -n "$HEADER_LINE" CHANGELOG.md > /tmp/cl.md
            printf '\n%s\n' "$ENTRY" >> /tmp/cl.md
            tail -n "+$((HEADER_LINE + 1))" CHANGELOG.md >> /tmp/cl.md
          else
            printf '%s\n\n' "$ENTRY" > /tmp/cl.md
            cat CHANGELOG.md >> /tmp/cl.md 2>/dev/null || true
          fi
          mv /tmp/cl.md CHANGELOG.md

      - name: Create changelog PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: changelog/${{ github.ref_name }}
          base: ${{ github.event.repository.default_branch }}
          commit-message: "chore: update CHANGELOG.md for ${{ github.ref_name }}"
          title: "chore: update CHANGELOG.md for ${{ github.ref_name }}"
          body: "Auto-generated changelog entry for ${{ github.ref_name }}. Please review before merging."
          add-paths: CHANGELOG.md
          sign-commits: true

  notify-finish:
    needs: [notify-start, release]
    if: always() && needs.notify-start.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read     # ← needed to fetch run_started_at for duration
      contents: read    # ← needed to read release notes via `gh release view`
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') }}" == "true" ]]; then
            echo "value=success" >> "$GITHUB_OUTPUT"
          else
            echo "value=failure" >> "$GITHUB_OUTPUT"
          fi

      - uses: kosli-dev/reusable-actions/slack-release-notify@f739efd12323329b5656fbbda9d843a836ace5ff # main
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel-id: ${{ vars.SLACK_CHANNEL_ID }}
          stage: finish
          status: ${{ steps.status.outputs.value }}
